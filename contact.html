<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Lotto Generator</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
            text-align: left;
        }
        .contact-form label {
            font-weight: bold;
        }
        .contact-form input, .contact-form textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
        }
        .contact-form button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .back-link {
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partnership Inquiry</h1>
        <form action="https://formspree.io/f/xyknkkrj" method="POST" class="contact-form">
            <div>
                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" required placeholder="example@email.com">
            </div>
            <div>
                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="5" required placeholder="Enter your inquiry here..."></textarea>
            </div>
            <button type="submit">Send Inquiry</button>
        </form>
        <a href="index.html" class="back-link">← Back to Generator</a>
    </div>
</body>
</html>
